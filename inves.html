<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bosque Cuántico Musical Fase 2</title>
<style>
  body { margin: 0; overflow: hidden; background: #000010; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ----- ESCENA, CÁMARA, RENDER -----
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ----- ORBIT CONTROLS -----
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 20;
controls.maxDistance = 200;

// ----- LUZ -----
const ambient = new THREE.AmbientLight(0xaaaaaa,0.3);
scene.add(ambient);
const pointLight = new THREE.PointLight(0xffffff,1,500);
pointLight.position.set(50,50,50);
scene.add(pointLight);

// ----- PARTICULAS -----
const particleCount = 1000;
const particles = [];
const geometry = new THREE.SphereGeometry(0.2,8,8);

for(let i=0;i<particleCount;i++){
  const material = new THREE.MeshStandardMaterial({
    color: new THREE.Color(`hsl(${Math.random()*360},100%,50%)`),
    emissive: new THREE.Color(`hsl(${Math.random()*360},100%,10%)`),
    transparent:true,
    opacity:0.7
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.x = (Math.random()-0.5)*100;
  mesh.position.y = (Math.random()-0.5)*100;
  mesh.position.z = (Math.random()-0.5)*100;

  mesh.userData = {
    vel: new THREE.Vector3(
      (Math.random()-0.5)*0.5,
      (Math.random()-0.5)*0.5,
      (Math.random()-0.5)*0.5
    ),
    statePhase: Math.random()*Math.PI*2,
    magnitude: Math.pow(Math.random(),0.5)*4 + 0.5 // Pareto-ish
  };

  scene.add(mesh);
  particles.push(mesh);
}

// ----- TRAILS (simple) -----
const trailMaterial = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.1});
particles.forEach(p=>{
  const trailGeom = new THREE.BufferGeometry().setFromPoints([p.position.clone(), p.position.clone()]);
  const trail = new THREE.Line(trailGeom, trailMaterial);
  p.userData.trail = trail;
  scene.add(trail);
});

// ----- AUDIO SIMULADO -----
function getAudioFactor(i){
  // Simula ondas de música viva, puedes reemplazar con audio real
  return Math.sin(Date.now()*0.002 + i)*0.5 + 0.5;
}

// ----- INTERACTIVIDAD -----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('mousemove', e=>{
  mouse.x = (e.clientX/window.innerWidth)*2 - 1;
  mouse.y = -(e.clientY/window.innerHeight)*2 + 1;
});

window.addEventListener('click', ()=>{
  particles.forEach(p=>{
    if(Math.random()<0.03){
      p.userData.vel.multiplyScalar(-1);
      p.material.color.offsetHSL(Math.random()*0.1,0,0);
    }
  });
});

// ----- ANIMACIÓN -----
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  particles.forEach((p,i)=>{
    // Movimiento + rebote
    p.position.add(p.userData.vel);
    ['x','y','z'].forEach(axis=>{
      if(Math.abs(p.position[axis])>50) p.userData.vel[axis]*=-1;
    });

    // Escala oscilante + audio factor
    const audioF = getAudioFactor(i);
    p.scale.setScalar(Math.sin(p.userData.statePhase*2)*p.userData.magnitude*audioF + 1);

    p.userData.statePhase += 0.02;

    // Trail update
    const trail = p.userData.trail;
    trail.geometry.setFromPoints([p.position.clone(), trail.geometry.attributes.position.array.length>0 ? new THREE.Vector3(trail.geometry.attributes.position.array[0], trail.geometry.attributes.position.array[1], trail.geometry.attributes.position.array[2]) : p.position.clone()]);
  });

  // Interacción mouse: iluminar partículas cercanas
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(particles);
  particles.forEach(p=>p.material.emissiveIntensity=0.2);
  intersects.forEach(i=>i.object.material.emissiveIntensity=1);

  renderer.render(scene,camera);
}

animate();

// ----- REDIMENSIONAR -----
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
